name: Build APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Decode release keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/galeriva.jks
            echo "GALERIVA_KEYSTORE_FILE=/tmp/galeriva.jks" >> "$GITHUB_ENV"
          fi

      - name: Build release AAB
        env:
          GALERIVA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          GALERIVA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GALERIVA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galeriva-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: galeriva-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
